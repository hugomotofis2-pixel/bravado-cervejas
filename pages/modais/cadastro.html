<div class="modal-content">
    <span class="close-modal" onclick="window.auth.fecharModalCadastro()">&times;</span>
    <h2>📝 Cadastro Bravado</h2>
    <form onsubmit="window.auth.fazerCadastro(event)">
        <div class="form-group">
            <label>Nome completo:</label>
            <input type="text" id="cadastro-nome" required placeholder="Seu nome">
        </div>
        <div class="form-group">
            <label>E-mail:</label>
            <input type="email" id="cadastro-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha:</label>
            <input type="password" id="cadastro-senha" required placeholder="******" minlength="8">
            <small style="color: #666; display: block; margin-top: 5px;">Mínimo 8 caracteres, 1 maiúscula, 1 número</small>
        </div>
        <div class="form-group">
            <label>Confirmar senha:</label>
            <input type="password" id="cadastro-confirmar" required placeholder="******">
        </div>
        <button type="submit" class="btn-auth">Cadastrar</button>
    </form>
    <div class="auth-switch">
        Já tem conta? <a onclick="window.auth.abrirModalLogin()">Faça login</a>
    </div>
</div>
