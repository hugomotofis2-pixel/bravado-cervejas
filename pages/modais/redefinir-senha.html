<div class="modal-content">
    <span class="close-modal" onclick="window.auth.fecharModalRedefinirSenha()">&times;</span>
    <h2>🔐 Redefinir Senha</h2>
    <form onsubmit="window.auth.redefinirSenha(event)">
        <div class="form-group">
            <label>Nova senha:</label>
            <input type="password" id="nova-senha" required placeholder="******" minlength="8">
        </div>
        <div class="form-group">
            <label>Confirmar nova senha:</label>
            <input type="password" id="confirmar-nova-senha" required placeholder="******">
        </div>
        <button type="submit" class="btn-auth">Redefinir Senha</button>
        <button type="button" class="btn-secondary" onclick="window.auth.fecharModalRedefinirSenha()">Cancelar</button>
    </form>
</div>
