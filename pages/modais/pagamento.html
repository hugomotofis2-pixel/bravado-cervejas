<div class="pagamento-content">
    <span class="close-modal" onclick="window.payment.fecharPagamento()">&times;</span>
    <h2>💰 Finalizar Pagamento</h2>
    
    <div class="resumo-pedido" id="resumo-pedido">
        <!-- Será preenchido via JS -->
    </div>

    <div class="cupom-area">
        <input type="text" id="cupom-input" placeholder="Digite seu cupom">
        <button onclick="window.payment.aplicarCupom()">Aplicar</button>
    </div>

    <h3>Escolha a forma de pagamento:</h3>
    <div class="metodos-pagamento">
        
        <div class="metodo-pagamento" onclick="window.payment.selecionarMetodo('pix')" id="metodo-pix">
            <span>📱</span>
            <div>PIX</div>
        </div>
        <div class="metodo-pagamento" onclick="window.payment.selecionarMetodo('boleto')" id="metodo-boleto">
            <span>📄</span>
            <div>Boleto</div>
        </div>
    </div>

    <!-- Forma Cartão -->
    <div id="forma-cartao" class="forma-pagamento">
        <div class="cartao-virtual">
            <div style="font-size: 2rem; position: absolute; top: 20px; right: 20px;">💳</div>
            <div class="cartao-numero" id="cartao-numero">**** **** **** ****</div>
            <div style="display: flex; justify-content: space-between;">
                <span id="cartao-nome">SEU NOME</span>
                <span id="cartao-validade">**/****</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>Número do cartão:</label>
            <input type="text" id="cartao-input" maxlength="19" placeholder="1234 5678 9012 3456" oninput="window.payment.formatarCartao(this)">
        </div>
        <div class="form-group">
            <label>Nome no cartão:</label>
            <input type="text" id="nome-cartao" placeholder="Como está no cartão" oninput="window.payment.atualizarNomeCartao(this)">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>Validade:</label>
                <input type="text" id="validade-cartao" placeholder="MM/AA" maxlength="5" oninput="window.payment.formatarValidade(this)">
            </div>
            <div class="form-group">
                <label>CVV:</label>
                <input type="text" id="cvv-cartao" placeholder="123" maxlength="3" oninput="window.payment.validarCVV(this)">
            </div>
        </div>
        <div class="form-group">
            <label>Parcelas:</label>
            <select id="parcelas-cartao">
                <option value="1">1x sem juros</option>
                <option value="2">2x sem juros</option>
                <option value="3">3x sem juros</option>
            </select>
        </div>
        <button class="btn-auth" onclick="window.payment.processarPagamentoCartao()" style="margin-top: 10px;">💳 Pagar com Cartão</button>
    </div>

    <!-- Forma PIX -->
    <div id="forma-pix" class="forma-pagamento">
        <div style="text-align: center;">
            <h3>Pague com PIX</h3>
            <div class="qr-code">
                <span>📱</span>
            </div>
            <p style="margin: 20px 0;">Escaneie o código QR com seu banco</p>
            <div class="pix-copia">
                <input type="text" id="pix-codigo" value="00020126580014br.gov.bcb.pix0136" readonly>
                <button onclick="window.payment.copiarPix()">📋 Copiar</button>
            </div>
            <button class="btn-auth" onclick="window.payment.processarPagamentoPix()" style="margin-top: 20px;">✅ Já paguei</button>
        </div>
    </div>

    <!-- Forma Boleto -->
    <div id="forma-boleto" class="forma-pagamento">
        <div style="text-align: center;">
            <h3>Boleto Bancário</h3>
            <div class="codigo-barras">
                34191.79001 01043.510047 91020.150008 8 88120026000
            </div>
            <p style="margin: 20px 0;">Vencimento: 3 dias úteis</p>
            <button class="btn-auth" onclick="window.payment.gerarBoleto()">📄 Gerar Boleto</button>
            <button class="btn-secondary" onclick="window.payment.processarPagamentoBoleto()" style="margin-top: 10px;">✅ Já paguei</button>
        </div>
    </div>

</div>
